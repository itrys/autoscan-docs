<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoScan Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="AutoScan Spring Boot Starter Documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm//docsify/4.13.1/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .sidebar-nav > ul > li > a {
      font-weight: bold;
    }
    .app-name-link img {
      max-width: 80%;
    }
    .markdown-section {
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- 加载版本配置和请求拦截 -->
  <script>
    // 动态创建 script 标签加载 version.js，添加时间戳防止缓存
    const script = document.createElement('script');
    script.src = 'version.js?v=' + Date.now();
    document.body.appendChild(script);
  </script>
  
  <!-- Docsify configuration -->
  <script>
    window.$docsify = {
      name: 'AutoScan',
      repo: 'https://github.com/itrys/autoscan-spring-boot-starter',
      basePath: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results',
        depth: 6
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
      }
    }
  </script>
  
  <!-- Load Docsify -->
  <script src="//cdn.jsdelivr.net/npm//docsify/4.13.1/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm//docsify/4.13.1/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm//docsify-copy-code/2.1.1/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm//prism/1.29.0/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm//prism/1.29.0/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm//prism/1.29.0/components/prism-markup.min.js"></script>
</body>
</html>
