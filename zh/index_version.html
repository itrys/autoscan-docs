<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AutoScan 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="AutoScan Spring Boot Starter 文档">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.bootcdn.net/ajax/libs/docsify/4.13.1/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .sidebar-nav > ul > li > a {
      font-weight: bold;
    }
    .app-name-link img {
      max-width: 80%;
    }
    .markdown-section {
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- 版本控制和请求拦截 -->
  <script>
    const DOC_VERSION = '1.1.0';
    const DOC_TIMESTAMP = '202603260852';
    const DOC_CACHE_KEY = DOC_VERSION + '_' + DOC_TIMESTAMP;
    console.log('[AutoScan Docs] Version:', DOC_CACHE_KEY);
    
    // 重写 XMLHttpRequest（修复版）
    const originalOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
      let modifiedUrl = url;
      if (typeof url === 'string' && url.endsWith('.md') && !url.includes('v=')) {
        const separator = url.includes('?') ? '&' : '?';
        modifiedUrl = url + separator + 'v=' + DOC_CACHE_KEY;
        console.log('[AutoScan Docs] XHR with version:', modifiedUrl);
      }
      // 使用 arguments 传递所有参数，避免参数丢失
      arguments[1] = modifiedUrl;
      return originalOpen.apply(this, arguments);
    };
    
    // 重写 fetch
    if (window.fetch) {
      const originalFetch = window.fetch;
      window.fetch = function(input, init) {
        let url = input;
        if (typeof input === 'string' && input.endsWith('.md') && !input.includes('v=')) {
          const separator = input.includes('?') ? '&' : '?';
          url = input + separator + 'v=' + DOC_CACHE_KEY;
          console.log('[AutoScan Docs] Fetch with version:', url);
        }
        return originalFetch.call(this, url, init);
      };
    }
  </script>
  
  <script>
    window.$docsify = {
      name: 'AutoScan',
      repo: 'https://github.com/itrys/autoscan-spring-boot-starter',
      basePath: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有结果',
        depth: 6
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.bootcdn.net/ajax/libs/docsify/4.13.1/docsify.min.js"></script>
  <script src="//cdn.bootcdn.net/ajax/libs/docsify/4.13.1/plugins/search.min.js"></script>
  <script src="//cdn.bootcdn.net/ajax/libs/docsify-copy-code/2.1.1/docsify-copy-code.min.js"></script>
  <script src="js/docsify-pagination.min.js"></script>
  <script src="//cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="//cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  <script src="//cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
</body>
</html>
