<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoScan Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="AutoScan Spring Boot Starter - Lightweight cross-package scanning solution">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    
    .logo {
      font-size: 72px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 48px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
    }
    
    .version {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }
    
    .description {
      font-size: 18px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .language-selector {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .language-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      border: 2px solid #42b983;
      border-radius: 10px;
      text-decoration: none;
      color: #42b983;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      min-width: 180px;
      justify-content: center;
    }
    
    .language-btn:hover {
      background: #42b983;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(66, 185, 131, 0.3);
    }
    
    .language-btn .flag {
      font-size: 24px;
    }
    
    .features {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }
    
    .features h3 {
      font-size: 20px;
      color: #333;
      margin-bottom: 20px;
    }
    
    .feature-list {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }
    
    .feature-item {
      background: #f8f9fa;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
    }
    
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #999;
    }
    
    .footer a {
      color: #42b983;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }
      
      .container {
        padding: 40px 20px;
      }
      
      .language-selector {
        flex-direction: column;
      }
      
      .language-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚀</div>
    <h1>AutoScan</h1>
    <div class="version">v1.1.0</div>
    <p class="description">
      Lightweight Spring Boot Starter for Cross-Package Scanning<br>
      轻量级 Spring Boot Starter，解决跨包扫描痛点
    </p>
    
    <div class="language-selector">
      <a href="zh/" class="language-btn">
        <span class="flag">🇨🇳</span>
        <span>中文文档</span>
      </a>
      <a href="en/" class="language-btn">
        <span class="flag">🇺🇸</span>
        <span>English</span>
      </a>
    </div>
    
    <div class="features">
      <h3>v1.1.0 New Features</h3>
      <div class="feature-list">
        <span class="feature-item">🌟 Wildcard Support</span>
        <span class="feature-item">🚫 Exclude Scanning</span>
        <span class="feature-item">🎨 Custom Annotations</span>
      </div>
    </div>
    
    <div class="footer">
      <a href="https://github.com/itrys/autoscan-spring-boot-starter" target="_blank">GitHub</a> • 
      <a href="https://gitee.com/itrys/autoscan-spring-boot-starter" target="_blank">Gitee</a>
    </div>
  </div>
  
  <script>
    // Auto-detect browser language and redirect
    (function() {
      var lang = navigator.language || navigator.userLanguage;
      var savedLang = localStorage.getItem('autoscan-doc-lang');
      
      // If user has saved language preference, use it
      if (savedLang) {
        return;
      }
      
      // Auto-detect and redirect
      if (lang.startsWith('zh')) {
        // Chinese browser, redirect to Chinese docs
        var redirect = confirm('检测到您的浏览器语言为中文，是否跳转到中文文档？\n\nDetected Chinese browser language. Redirect to Chinese documentation?');
        if (redirect) {
          localStorage.setItem('autoscan-doc-lang', 'zh');
          window.location.href = 'zh/';
        }
      } else {
        // Non-Chinese browser, redirect to English docs
        var redirect = confirm('Redirect to English documentation?\n\n跳转到英文文档？');
        if (redirect) {
          localStorage.setItem('autoscan-doc-lang', 'en');
          window.location.href = 'en/';
        }
      }
    })();
  </script>
</body>
</html>
